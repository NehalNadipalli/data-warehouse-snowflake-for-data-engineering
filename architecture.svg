<svg width="700" height="900" viewBox="0 0 700 900" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="700" height="900" fill="#ffffff"/>
  <text x="350" y="35" text-anchor="middle" font-size="20" font-weight="600" fill="#1a1a1a">Real-Time Data Pipeline Architecture</text>

  <!-- Source data -->
  <rect x="210" y="65" width="280" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="350" y="88" text-anchor="middle" font-size="15" font-weight="600" fill="#2C2C2A">Source data</text>
  <text x="350" y="107" text-anchor="middle" font-size="12" fill="#444441">Files, APIs, streams</text>
  <line x1="350" y1="121" x2="350" y2="181" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Apache NiFi -->
  <rect x="210" y="181" width="280" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="350" y="204" text-anchor="middle" font-size="15" font-weight="600" fill="#04342C">Apache NiFi</text>
  <text x="350" y="223" text-anchor="middle" font-size="12" fill="#085041">Data ingestion and routing</text>
  <line x1="350" y1="237" x2="350" y2="297" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- AWS S3 -->
  <rect x="210" y="297" width="280" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="350" y="320" text-anchor="middle" font-size="15" font-weight="600" fill="#04342C">AWS S3</text>
  <text x="350" y="339" text-anchor="middle" font-size="12" fill="#085041">Cloud object storage</text>
  <line x1="350" y1="353" x2="350" y2="413" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Snowpipe -->
  <rect x="210" y="413" width="280" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="350" y="436" text-anchor="middle" font-size="15" font-weight="600" fill="#04342C">Snowpipe</text>
  <text x="350" y="455" text-anchor="middle" font-size="12" fill="#085041">Continuous auto-load</text>
  <line x1="350" y1="469" x2="350" y2="529" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Staging tables -->
  <rect x="210" y="529" width="280" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="350" y="552" text-anchor="middle" font-size="15" font-weight="600" fill="#26215C">Staging tables</text>
  <text x="350" y="571" text-anchor="middle" font-size="12" fill="#3C3489">Raw landing zone</text>
  <line x1="350" y1="585" x2="350" y2="645" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Streams and tasks -->
  <rect x="210" y="645" width="280" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="350" y="668" text-anchor="middle" font-size="15" font-weight="600" fill="#26215C">Streams and tasks</text>
  <text x="350" y="687" text-anchor="middle" font-size="12" fill="#3C3489">Change capture, transform</text>
  <line x1="350" y1="701" x2="350" y2="761" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Analytics tables -->
  <rect x="210" y="761" width="280" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text x="350" y="784" text-anchor="middle" font-size="15" font-weight="600" fill="#4A1B0C">Analytics tables</text>
  <text x="350" y="803" text-anchor="middle" font-size="12" fill="#712B13">Final curated data</text>
</svg>
